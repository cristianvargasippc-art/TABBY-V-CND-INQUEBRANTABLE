<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CND INQUEBRANTABLE — Tabulación WSDC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --o:#ea580c;--od:#c2410c;--odb:#7c2d12;--ol:#fed7aa;--op:#fff7ed;
  --blk:#0a0400;--s1:#1a0800;--s2:#2d1100;--s3:#3d1a00;
  --wh:#fff;--wh7:rgba(255,255,255,0.7);--wh4:rgba(255,255,255,0.4);--wh15:rgba(255,255,255,0.15);
  --bdr:rgba(234,88,12,0.2);--bdr2:rgba(234,88,12,0.45);
  --grn:#16a34a;--gnl:#dcfce7;--red:#dc2626;--rdl:#fee2e2;--blu:#1d4ed8;--bll:#dbeafe;
  --pur:#7c3aed;--prl:#ede9fe;
  --r:10px;--rl:16px;
  --ff:'DM Sans',sans-serif;--fm:'DM Mono',monospace;--fd:'Bebas Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--ff);background:var(--blk);color:var(--blk);font-size:14px;line-height:1.5;min-height:100vh;-webkit-text-size-adjust:100%;text-size-adjust:100%}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--o);border-radius:4px}

/* ── TOPBAR ── */
#topbar{
  position:sticky;top:0;z-index:1000;
  background:linear-gradient(90deg,#0a0400 0%,#1a0800 60%,#2d1100 100%);
  border-bottom:2px solid var(--o);
  box-shadow:0 2px 20px rgba(234,88,12,0.3);
}
.tbi{max-width:1200px;margin:0 auto;display:flex;align-items:center;padding:0 16px;height:56px;gap:0}
.tb-logo{
  display:flex;align-items:center;gap:10px;flex-shrink:0;margin-right:10px;
  background:none;border:none;cursor:pointer;padding:6px 10px 6px 6px;
  border-radius:8px;transition:background .2s;
}
.tb-logo:hover{background:rgba(234,88,12,.15)}
.tb-logo-icon{font-size:26px;line-height:1;animation:flutter 4s ease-in-out infinite;filter:drop-shadow(0 0 6px rgba(234,88,12,.6))}
@keyframes flutter{0%,100%{transform:rotate(-2deg) scale(1)}50%{transform:rotate(2deg) scale(1.1)}}
.tb-logo-text{
  font-family:var(--fd);font-size:19px;letter-spacing:3px;line-height:1;
  background:linear-gradient(90deg,#fb923c,#ea580c,#fb923c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.tb-logo-sub{font-size:8px;letter-spacing:1.5px;color:rgba(251,146,60,.6);display:block;margin-top:1px;font-family:var(--ff);-webkit-text-fill-color:rgba(251,146,60,.6)}
.tb-nav{display:flex;align-items:center;gap:0;flex:1;overflow-x:auto;scrollbar-width:none}
.tb-nav::-webkit-scrollbar{display:none}
.tbn{padding:0 10px;height:56px;display:flex;align-items:center;color:var(--wh7);font-size:11.5px;font-weight:500;cursor:pointer;border:none;background:none;transition:all .2s;white-space:nowrap;position:relative;font-family:var(--ff)}
.tbn:hover{color:#fff;background:rgba(234,88,12,.12)}
.tbn.active{color:var(--o)}
.tbn.active::after{content:'';position:absolute;bottom:0;left:10px;right:10px;height:2px;background:var(--o);border-radius:2px 2px 0 0}
.tbn-drop{position:relative}
.tbn-drop:hover .dm,.tbn-drop:focus-within .dm{display:block}
.dm{display:none;position:absolute;top:100%;left:0;background:var(--s1);border:1px solid var(--bdr2);border-radius:var(--r);min-width:190px;z-index:200;padding:5px 0;box-shadow:0 12px 40px rgba(0,0,0,.7)}
.di{display:block;padding:8px 14px;color:var(--wh7);font-size:12px;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--ff)}
.di:hover{color:var(--o);background:rgba(234,88,12,.1)}
.di.ds{color:rgba(255,255,255,.3);font-size:10px;letter-spacing:1px;padding:6px 14px 2px;cursor:default;text-transform:uppercase}
.tb-auth{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.tba{padding:6px 13px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--ff);white-space:nowrap}
.tba-ghost{background:transparent;border:1px solid rgba(234,88,12,.5);color:var(--wh7)}
.tba-ghost:hover{border-color:var(--o);color:var(--o)}
.tba-pill{background:var(--o);border:none;color:#fff}
.tba-pill:hover{background:var(--od)}
/* Hamburger */
#hbg{display:none;background:none;border:none;cursor:pointer;padding:8px;flex-direction:column;gap:5px;margin-left:8px;flex-shrink:0}
#hbg span{display:block;width:22px;height:2px;background:var(--o);border-radius:2px;transition:all .3s}
#mob-drawer{display:none;position:fixed;top:52px;left:0;right:0;bottom:0;z-index:999;background:rgba(10,4,0,.98);overflow-y:auto;padding:10px 0;-webkit-overflow-scrolling:touch}
#mob-drawer.open{display:block}
.mob-item{display:flex;align-items:center;padding:13px 20px;color:var(--wh7);font-size:13px;font-weight:500;border-bottom:1px solid rgba(234,88,12,.1);cursor:pointer;background:none;border-left:none;border-right:none;border-top:none;width:100%;text-align:left;font-family:var(--ff);transition:all .2s}
.mob-item:hover{color:var(--o);background:rgba(234,88,12,.06)}
.mob-sec{font-family:var(--fd);font-size:10px;letter-spacing:2px;color:rgba(234,88,12,.45);padding:12px 20px 3px;text-transform:uppercase}
.mob-auth{display:flex;gap:8px;padding:14px 20px;flex-wrap:wrap}

/* ── HERO ── */
#hero{background:linear-gradient(150deg,#3d1a00 0%,#7c2d12 20%,#c2410c 50%,#ea580c 75%,#f97316 90%,#fb923c 100%);position:relative;overflow:hidden}
#hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='0.04'%3E%3Cpath d='M0 0h40v40H0V0zm40 40h40v40H40V40z'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
#hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(to bottom,transparent,var(--blk));pointer-events:none}
.hero-body{max-width:1200px;margin:0 auto;padding:44px 16px 70px;display:flex;flex-direction:column;align-items:center;text-align:center}
.bf{font-size:80px;line-height:1;animation:flutter 4s ease-in-out infinite;filter:drop-shadow(0 8px 32px rgba(0,0,0,.5))}
.ht{font-family:var(--fd);font-size:clamp(34px,8vw,72px);letter-spacing:5px;color:#fff;line-height:.95;margin-top:10px;text-shadow:0 4px 30px rgba(0,0,0,.5)}
.hs{font-family:var(--fd);font-size:clamp(16px,3.5vw,28px);letter-spacing:3px;color:rgba(255,255,255,.8);line-height:1}
.hmeta{display:flex;gap:14px;margin-top:18px;flex-wrap:wrap;justify-content:center}
.hpill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.85)}
.hlinks{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;justify-content:center;padding:0 8px}
.hl{padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--ff)}
.hl-p{background:#fff;color:var(--od);border:none}
.hl-p:hover{background:var(--op)}
.hl-s{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.28);color:#fff}
.hl-s:hover{background:rgba(0,0,0,.5)}
/* Stat strip */
.sstrip{background:rgba(0,0,0,.3);border-top:1px solid var(--wh15);border-bottom:1px solid var(--wh15);padding:14px 0;margin-bottom:20px}
.sstrip-i{max-width:1200px;margin:0 auto;padding:0 16px;display:flex;justify-content:center;flex-wrap:wrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
.sc{text-align:center;padding:6px 24px;border-right:1px solid var(--wh15)}
.sc:last-child{border-right:none}
.scn{font-family:var(--fd);font-size:34px;color:#fff;line-height:1}
.scl{font-size:10px;color:var(--wh4);letter-spacing:2px;text-transform:uppercase;margin-top:2px}

/* ── LAYOUT ── */
.page{max-width:1200px;margin:0 auto;padding:0 16px 60px;width:100%}
.page-sm{max-width:480px;margin:0 auto;padding:0 16px 60px}
.page-md{max-width:760px;margin:0 auto;padding:0 16px 60px}
.ph{padding:28px 0 18px;display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
.ph-e{font-size:34px;line-height:1}
.ph-t{font-family:var(--fd);font-size:clamp(26px,5vw,42px);letter-spacing:3px;color:#fff;line-height:.95}
.ph-s{font-size:11px;color:var(--wh4);margin-top:3px;letter-spacing:1px}

/* ── CARDS ── */
.card{background:#fff;border-radius:var(--rl);padding:22px;margin-bottom:14px}
.cd{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--rl);padding:22px;margin-bottom:14px}
.ct{font-family:var(--fd);font-size:19px;letter-spacing:2px;color:var(--o);margin-bottom:16px}
.ctw{font-family:var(--fd);font-size:19px;letter-spacing:2px;color:#fff;margin-bottom:16px}
.ctsm{font-family:var(--fd);font-size:14px;letter-spacing:1.5px;color:var(--o);margin-bottom:10px}

/* ── TABLES ── */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--ol);-webkit-overflow-scrolling:touch}
.tw table{min-width:520px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--blk);color:var(--ol);padding:9px 11px;text-align:left;font-weight:600;font-size:11px;letter-spacing:1px;text-transform:uppercase}
thead th:first-child{border-radius:var(--r) 0 0 0}
thead th:last-child{border-radius:0 var(--r) 0 0}
tbody td{padding:9px 11px;border-bottom:1px solid var(--ol);color:var(--blk);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--op)}
.rk{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.rk1{background:linear-gradient(135deg,#f59e0b,var(--o));color:#fff}
.rk2{background:var(--od);color:#fff}
.rk3{background:var(--odb);color:#fff}
.rkn{background:#f3f4f6;color:#374151}
td.num{font-family:var(--fm);font-weight:500;text-align:right}
td.ctr{text-align:center}

/* ── BADGES ── */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.2px}
.bo{background:var(--op);color:var(--od);border:1px solid var(--ol)}
.bg{background:var(--gnl);color:#14532d;border:1px solid #86efac}
.bb{background:var(--bll);color:#1e3a8a;border:1px solid #93c5fd}
.br{background:var(--rdl);color:#7f1d1d;border:1px solid #fca5a5}
.bk{background:var(--s1);color:var(--ol)}
.bp{background:var(--prl);color:#4c1d95;border:1px solid #c4b5fd}
.bbrk{background:linear-gradient(90deg,var(--od),var(--o));color:#fff;border:none}
.byel{background:#fef3c7;color:#78350f;border:1px solid #fcd34d}
/* Judge role badges */
.b-chair{background:#0c4a6e;color:#bae6fd;border:none}
.b-panel{background:#1e3a8a;color:#bfdbfe;border:none}
.b-train{background:#4a1d96;color:#ddd6fe;border:none}
/* Judge role circles */
.role-circle{
  display:inline-flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:50%;
  font-size:10px;font-weight:800;flex-shrink:0;line-height:1;
}
.rc-c{background:#0c4a6e;color:#bae6fd}
.rc-p{background:#1e3a8a;color:#bfdbfe}
.rc-t{background:#4a1d96;color:#ddd6fe}
/* Judge chip in panel display */
.judge-chip-display{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px 3px 4px;border-radius:20px;font-size:11px;font-weight:600;
  margin:2px 2px 2px 0;
}
.jcd-chair{background:#e0f2fe;color:#0c4a6e;border:1px solid #bae6fd}
.jcd-panel{background:#eff6ff;color:#1e3a8a;border:1px solid #bfdbfe}
.jcd-train{background:#f5f3ff;color:#4a1d96;border:1px solid #ddd6fe}
/* Prop/Opp team pills */
.b-prop{background:#14532d;color:#bbf7d0;border:none}
.b-opp{background:#450a0a;color:#fca5a5;border:none}
/* Prop/Opp */
.b-prop{background:#14532d;color:#bbf7d0;border:none}
.b-opp{background:#450a0a;color:#fca5a5;border:none}

/* ── STATUS PILLS ── */
.rp{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.rp-pend{background:#f3f4f6;color:#6b7280}
.rp-draw{background:var(--bll);color:#1e3a8a}
.rp-pub{background:var(--op);color:var(--od)}
.rp-act{background:linear-gradient(90deg,#f59e0b,var(--o));color:#fff}
.rp-done{background:var(--gnl);color:#14532d}
.rp-elim{background:var(--prl);color:#4c1d95}

/* ── DEBATE ITEM ── */
.di-card{background:var(--op);border:1px solid var(--ol);border-radius:var(--r);padding:13px;margin-bottom:8px}
.di-card.editing{border-color:var(--o);border-width:2px;background:#fffbf7}
.di-teams{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:7px}
.di-team{padding:5px 11px;border-radius:6px;font-size:12px;font-weight:700}
.di-prop{background:#14532d;color:#bbf7d0}
.di-opp{background:#450a0a;color:#fca5a5}
.di-vs{font-family:var(--fd);font-size:18px;color:var(--o);line-height:1}
.di-meta{display:flex;gap:10px;font-size:11px;color:#9a3412;align-items:center;flex-wrap:wrap}
.di-winner{background:#14532d;color:#bbf7d0;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700}
.di-pend{background:#f3f4f6;color:#6b7280;padding:3px 9px;border-radius:5px;font-size:11px}
.di-judges{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}

/* ── MOTION ── */
.motion-card{background:var(--op);border-left:4px solid var(--o);border-radius:0 var(--r) var(--r) 0;padding:13px 15px;margin-bottom:10px}
.mr{font-size:10px;color:var(--od);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.mt{font-size:14px;font-style:italic;color:var(--blk);font-weight:500;line-height:1.4;margin-bottom:8px}
.mb-wrap{display:flex;align-items:center;gap:8px;font-size:11px}
.mb{flex:1;height:7px;border-radius:4px;background:var(--ol);overflow:hidden}
.mb-p{height:100%;background:linear-gradient(90deg,var(--o),var(--od))}
.mb-o{height:100%;background:linear-gradient(90deg,#0c4a6e,#1e3a8a)}

/* ── BREAK ── */
.brk-item{background:#fff;border:1px solid var(--ol);border-radius:var(--r);padding:11px 14px;margin-bottom:5px;display:flex;align-items:center;gap:12px;transition:all .2s}
.brk-item:hover{background:var(--op);transform:translateX(2px)}
.brk-pos{font-family:var(--fd);font-size:22px;color:var(--o);min-width:30px}

/* ── BRACKET ── */
.bracket-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.bracket{display:flex;gap:20px;padding:12px 4px;min-width:700px}
.bracket-col{display:flex;flex-direction:column;justify-content:space-around;gap:12px;min-width:180px}
.bracket-col-title{font-family:var(--fd);font-size:13px;letter-spacing:1.5px;color:var(--o);margin-bottom:8px;text-align:center}
.bracket-match{background:var(--op);border:1px solid var(--ol);border-radius:var(--r);padding:10px;position:relative}
.bracket-match.winner-set{border-color:var(--o)}
.bm-team{padding:5px 8px;border-radius:5px;font-size:12px;font-weight:600;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.bm-team.bm-win{background:var(--od);color:#fff}
.bm-team.bm-loss{background:#f3f4f6;color:#6b7280}
.bm-team.bm-tbd{background:#f3f4f6;color:#9ca3af;font-style:italic}
.bm-pts{font-size:10px;font-family:var(--fm);margin-left:6px}

/* ── CHECK-IN ── */
.ci-bar{height:10px;border-radius:5px;background:var(--ol);overflow:hidden;margin:8px 0}
.ci-fill{height:100%;background:linear-gradient(90deg,var(--od),var(--o));transition:width .5s}
.ci-row{display:flex;justify-content:space-between;align-items:center;padding:8px 11px;border-bottom:1px solid var(--ol);font-size:13px}
.ci-row:last-child{border-bottom:none}
.ci-chk{background:var(--grn);color:#fff;border:none;padding:4px 11px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--ff)}
.ci-unchk{background:var(--red);color:#fff;border:none;padding:4px 11px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--ff)}

/* ── FORMS ── */
.fl{font-size:11px;font-weight:700;color:var(--odb);letter-spacing:.7px;text-transform:uppercase;margin-bottom:3px;display:block}
input,select,textarea{width:100%;padding:9px 11px;border:1.5px solid var(--ol);border-radius:8px;font-size:13px;outline:none;background:#fff;color:var(--blk);font-family:var(--ff);transition:border-color .2s;margin-bottom:8px}
input:focus,select:focus,textarea:focus{border-color:var(--o)}
textarea{resize:vertical;min-height:70px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg>*{margin-bottom:0!important}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fg3>*{margin-bottom:0!important}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.fg4>*{margin-bottom:0!important}
/* Score input — compact */
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.score-lbl{font-size:12px;font-weight:600;color:var(--odb);min-width:70px}
.score-in{width:65px!important;margin-bottom:0!important;text-align:center;font-family:var(--fm);font-weight:500}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 15px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--ff);letter-spacing:.2px;white-space:nowrap}
.btn-full{width:100%;justify-content:center}
.bo-btn{background:var(--o);color:#fff}
.bo-btn:hover{background:var(--od)}
.bdk-btn{background:var(--blk);color:var(--ol)}
.bdk-btn:hover{background:#000}
.bg-btn{background:var(--grn);color:#fff}
.bg-btn:hover{background:#15803d}
.br-btn{background:transparent;border:1.5px solid var(--o);color:var(--o)}
.br-btn:hover{background:var(--o);color:#fff}
.brd-btn{background:transparent;border:1.5px solid var(--red);color:var(--red)}
.brd-btn:hover{background:var(--red);color:#fff}
.bpur-btn{background:var(--pur);color:#fff}
.bpur-btn:hover{background:#6d28d9}
.bsm{padding:5px 10px;font-size:11px;border-radius:6px}
.bxs{padding:3px 7px;font-size:10px;border-radius:5px}
.bgrp{display:flex;gap:6px;flex-wrap:wrap}

/* ── ALERTS ── */
.alert{padding:10px 13px;border-radius:8px;font-size:13px;margin-bottom:12px;font-weight:500;line-height:1.4}
.al-ok{background:var(--gnl);color:#14532d;border:1px solid #86efac}
.al-err{background:var(--rdl);color:#7f1d1d;border:1px solid #fca5a5}
.al-info{background:var(--bll);color:#1e3a8a;border:1px solid #93c5fd}
.al-warn{background:#fef3c7;color:#78350f;border:1px solid #fcd34d}

/* ── ADMIN NAV ── */
.adm-nav{background:var(--blk);border:1px solid var(--bdr);border-radius:var(--rl);padding:9px;display:flex;gap:3px;flex-wrap:wrap;margin-bottom:14px}
.an{padding:7px 11px;border-radius:7px;border:none;font-size:11px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.4);background:transparent;transition:all .2s;font-family:var(--ff);letter-spacing:.3px;white-space:nowrap}
.an:hover:not(.active){color:var(--ol)}
.an.active{background:var(--o);color:#fff}

/* ── SECTION TITLE ── */
.sec{font-family:var(--fd);font-size:12px;letter-spacing:2px;color:var(--od);text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--ol)}

/* ── INNER TABS ── */

.judge-chip{
  display:inline-flex;align-items:center;gap:5px;

}

function gid(){return 'x'+Math.random().toString(36).substr(2,9)}
function gtok(p='tk'){return p+'-'+Math.random().toString(36).substr(2,8)}
function tnow(){return new Date().toLocaleString('es-DO',{dateStyle:'short',timeStyle:'short'})}
function toast(m,d=2800){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),d)}
function cpy(txt){try{navigator.clipboard.writeText(txt)}catch(e){};toast('📋 Copiado!')}
function getTeam(id){return D.teams.find(t=>t.id===id)}
function getAdj(id){return D.adjudicators.find(a=>a.id===id)}
function getRound(id){return D.rounds.find(r=>r.id===id)}
function tn(id){const t=getTeam(id);return t?t.name:'—'}
function tfn(id){const t=getTeam(id);return t?t.full:'—'}
function an(id){const a=getAdj(id);return a?a.name:'Sin asignar'}
function v(id){const e=document.getElementById(id);return e?e.value.trim():''}
function sv(id,val){const e=document.getElementById(id);if(e)e.value=val}
function ni(id){return parseInt(v(id))||0}
function starsH(n,m=5){let s='';for(let i=1;i<=m;i++)s+=`<span style="color:${i<=n?'#ea580c':'#d1d5db'}">${i<=n?'★':'☆'}</span>`;return s}
function pct(a,b){return (a+b)===0?50:Math.round(a/(a+b)*100)}
function teamTot(d,side){const s=side==='prop'?d.propScores:d.oppScores;if(!s||!s.s1)return 0;return(s.s1||0)+(s.s2||0)+(s.s3||0)+(s.reply||0)}
function hasFB(dId,tok,tgt){return(D.feedbacks[dId]||[]).some(f=>f.from===tok&&f.targetId===tgt)}
function ciCount(){return D.teams.filter(t=>t.ci).length+D.adjudicators.filter(a=>a.ci).length}
function totalPpl(){return D.teams.length+D.adjudicators.length}
function tDebates(){return D.rounds.reduce((s,r)=>s+r.debates.length,0)}
function getPartByToken(tok){
  const a=D.adjudicators.find(x=>x.token===tok);if(a)return{type:'juez',data:a};
  const t=D.teams.find(x=>x.token===tok);if(t)return{type:'equipo',data:t};
  return null;
}
function getSpeakers(){
  const spk={};
  D.rounds.forEach(r=>r.debates.forEach(d=>{
    if(!d.winner)return;
    const pt=getTeam(d.prop),op=getTeam(d.opp);
    if(!pt||!op||!d.propScores.s1)return;
    [[pt,'prop'],[op,'opp']].forEach(([t,side])=>{
      const sc=side==='prop'?d.propScores:d.oppScores;
      [[t.s1,'s1'],[t.s2,'s2'],[t.s3,'s3']].forEach(([nm,k])=>{
        if(!spk[nm])spk[nm]={name:nm,team:t.name,inst:t.inst,pts:0,rounds:0};
        spk[nm].pts+=(sc[k]||0);spk[nm].rounds++;
      });
    });
  }));
  return Object.values(spk).sort((a,b)=>b.pts-a.pts);
}
function getReplies(){
  const rep={};
  D.rounds.forEach(r=>r.debates.forEach(d=>{
    if(!d.winner||!d.propScores.s1)return;
    [[getTeam(d.prop),d.propScores],[getTeam(d.opp),d.oppScores]].forEach(([t,s])=>{
      if(!t||!s.reply)return;
      if(!rep[t.s1])rep[t.s1]={name:t.s1,team:t.name,inst:t.inst,pts:0,rounds:0};
      rep[t.s1].pts+=s.reply;rep[t.s1].rounds++;
    });
  }));
  return Object.values(rep).sort((a,b)=>b.pts-a.pts);
}
function getBreakTeams(){
  const s=[...D.teams].sort((a,b)=>b.wins-a.wins||b.pts-a.pts);
  const b=s.filter(t=>t.wins>=2);
  return(b.length>=2?b:s).slice(0,D.tournament.breakSize);
}
function getBreakAdjs(){return D.adjudicators.filter(a=>a.breaking).sort((a,b)=>b.score-a.score)}
function judgePanel(d){
  const chair=getAdj(d.panel.chair);
  const panelists=(d.panel.panelists||[]).map(id=>getAdj(id)).filter(Boolean);
  const trainees=(d.panel.trainees||[]).map(id=>getAdj(id)).filter(Boolean);
  return{chair,panelists,trainees};
}
function judgePanelHtml(d){
  var p = judgePanel(d);
  var out = '';
  if(p.chair){
    out += '<span class="judge-chip-display jcd-chair">'
         + '<span class="role-circle rc-c">C</span>'
         + 'Chair: ' + p.chair.name
         + '</span>';
  }
  p.panelists.forEach(function(a){
    out += '<span class="judge-chip-display jcd-panel">'
         + '<span class="role-circle rc-p">P</span>'
         + 'Panelista: ' + a.name
         + '</span>';
  });
  p.trainees.forEach(function(a){
    out += '<span class="judge-chip-display jcd-train">'
         + '<span class="role-circle rc-t">T</span>'
         + 'Trainee: ' + a.name
         + '</span>';
  });
  return out || '<span style="font-size:11px;color:#9a3412;font-style:italic">Sin panel asignado</span>';
}
function doneRounds(){return D.rounds.filter(r=>r.status==='done')}

function nav(v2){
  D.view = v2;
  D.alert = null;
  D.drawEdit = null;
  D.swapSlot = null;
  // For results: pick a valid round
  if(v2==='round-results'){
    var rel = D.role==='admin' ? D.rounds : D.rounds.filter(function(r){return r.published;});
    if(!rel.length) rel = D.rounds; // fallback: show all
    var found = rel.find(function(r){return r.id===D.iTab;});
    if(!found) D.iTab = rel[0].id;
  }
  // For break: reset to consistent state
  if(v2==='break-open'||v2==='break-esl'||v2==='break-nov'||v2==='break-adjs') D.iTab = v2;
  try{ render(); }catch(e){ console.error('render error',e); }
  window.scrollTo({top:0,behavior:'smooth'});
}
function navR(id){ D.iTab=id; nav('round-results'); }
function logout(){D.role=null;D.token=null;nav('home')}
function tMob(){
  D.mobOpen=!D.mobOpen;
  const dr=document.getElementById('mob-drawer');
  const hb=document.getElementById('hbg');
  if(dr){dr.classList.toggle('open',D.mobOpen)}
  if(hb){
    const sp=hb.querySelectorAll('span');
    sp[0].style.transform=D.mobOpen?'rotate(45deg) translate(5px,5px)':'';
    sp[1].style.opacity=D.mobOpen?'0':'1';
    sp[2].style.transform=D.mobOpen?'rotate(-45deg) translate(5px,-5px)':'';
  }
  if(D.mobOpen)buildMob();
}
function cMob(){D.mobOpen=false;const dr=document.getElementById('mob-drawer');if(dr)dr.classList.remove('open');const hb=document.getElementById('hbg');if(hb){hb.querySelectorAll('span').forEach(s=>{s.style.transform='';s.style.opacity='1';})}}
function mnav(v2){cMob();nav(v2)}

  const mc=document.getElementById('mob-c');if(!mc)return;

      ${D.role==='admin'?`<button class="btn bo-btn bsm" onclick="mnav('admin')">⚙ Admin</button><button class="btn br-btn bsm" onclick="logout();cMob()">Salir</button>`

function renderMotions(){

  return`<div class="page"><div class="ph"><span class="ph-e">📜</span><div><div class="ph-t">Mociones</div><div class="ph-s">${rounds.length} mociones · Estadísticas Prop/Opp</div></div></div>
  ${rounds.map(r=>{
    const dbs=r.debates.filter(d=>d.winner);
    const propW=dbs.filter(d=>d.winner===d.prop).length;
    const oppW=dbs.filter(d=>d.winner===d.opp).length;
    const tot=propW+oppW;
    const pp=pct(propW,oppW);
    return`<div class="motion-card">
      <div class="mr">${r.name} <span class="rp ${r.status==='done'?'rp-done':r.status==='active'?'rp-act':'rp-pend'}">${r.status}</span></div>
      <div class="mt">"${r.motion}"</div>

        <div class="mb"><div class="mb-p" style="width:${pp}%"></div></div>
        <span style="font-size:11px;font-weight:700;color:#1d4ed8">Opp ${100-pp}%</span>

      </div>`:`<div style="font-size:11px;color:#9a3412">Sin resultados aún</div>`}

  }).join('')}

}

function renderRoundResults(){
  var allR = D.role==='admin' ? D.rounds : D.rounds.filter(function(r){return r.published;});
  if(!allR.length){
    return '<div class="page"><div class="ph"><span class="ph-e">📋</span><div><div class="ph-t">Resultados</div></div></div><div class="card" style="text-align:center;padding:40px;color:#9a3412">Los resultados se publicarán pronto. Vuelve cuando el administrador publique una ronda.</div></div>';
  }
  if(!allR.find(function(r){return r.id===D.iTab;})) D.iTab = allR[0].id;
  var round = getRound(D.iTab) || allR[0];
  if(!round) return '';

  // Build tab pills
  var tabs = allR.map(function(r){
    var active = (D.iTab===r.id) ? ' active' : '';
    return '<button class="itab'+active+'" onclick="D.iTab=\''+r.id+'\';render()">'+r.name+'</button>';
  }).join('');

  // Build debate cards
  var debateCards = '';
  if(round.debates.length){
    round.debates.forEach(function(d){
      var propName = tn(d.prop);
      var oppName  = tn(d.opp);
      var panel    = judgePanelHtml(d);
      var scoreInfo = '';
      if(d.winner && d.propScores && d.propScores.s1){
        scoreInfo = '<span style="font-size:10px;color:#14532d;margin-left:6px">PROP '+teamTot(d,'prop')+'pts</span>'
                  + '<span style="font-size:10px;color:#7f1d1d;margin-left:4px">OPP '+teamTot(d,'opp')+'pts</span>';
        if(d.split) scoreInfo += ' <span class="badge byel">Split</span>';
      }
      var resultBadge = d.winner
        ? ('<span class="di-winner">🏆 '+tn(d.winner)+'</span>'+scoreInfo)
        : '<span class="di-pend">⏳ Pendiente</span>';

      debateCards += '<div class="di-card">'
        + '<div class="di-teams">'
        + '<span class="di-team di-prop">'+propName+' <span class="badge b-prop" style="font-size:9px">Proposición</span></span>'
        + '<span class="di-vs">VS</span>'
        + '<span class="di-team di-opp">'+oppName+' <span class="badge b-opp" style="font-size:9px">Oposición</span></span>'
        + '</div>'
        + '<div class="di-meta"><span>📍 '+d.room+'</span> '+resultBadge+'</div>'
        + '<div class="di-judges" style="margin-top:5px">'+panel+'</div>'
        + '</div>';
    });
  } else {
    debateCards = '<div style="text-align:center;padding:28px;color:#9a3412">Draw no generado aún.</div>';
  }

  // Status pill
  var statusClass = round.status==='done'?'rp-done':round.status==='active'?'rp-act':round.published?'rp-pub':'rp-pend';
  var statusLabel = round.type!=='prelim' ? 'Eliminatoria' : round.status;

  // Motion block
  var motionBlock = round.motion
    ? '<div class="motion-card" style="margin-bottom:14px"><div class="mr">Moción</div><div class="mt">"'+round.motion+'"</div></div>'
    : '';

  var elimBadge = round.type!=='prelim'
    ? '<span class="rp rp-elim">'+round.type+'</span>'
    : '';

  return '<div class="page">'
    + '<div class="ph"><span class="ph-e">📋</span><div><div class="ph-t">Resultados</div><div class="ph-s">Formato WSDC · Proposición / Oposición</div></div></div>'
    + '<div class="itabs">'+tabs+'</div>'
    + '<div class="card">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">'
    + '<div class="ct" style="margin-bottom:0">'+round.name+'</div>'
    + '<span class="rp '+statusClass+'">'+statusLabel+'</span>'
    + elimBadge
    + (round.published ? ' <span class="badge bg" style="font-size:10px">🌐 Publicado</span>' : '')
    + '</div>'
    + motionBlock
    + debateCards
    + '</div></div>';
}


function renderBreakView(cat){
  cat = cat || 'open';
  var labels = {open:'Abierto', esl:'ESL', nov:'Novatos'};
  var label = labels[cat] || cat;

  var filtered;
  if(cat==='esl')       filtered = D.teams.filter(function(t){return t.esl;});
  else if(cat==='nov')  filtered = D.teams.filter(function(t){return t.nov;});
  else                  filtered = D.teams.slice();

  var sorted = filtered.sort(function(a,b){ return b.wins-a.wins || b.pts-a.pts; });
  var breaking = sorted.filter(function(t){ return t.wins>=2; });
  var list = (breaking.length>=2) ? breaking : sorted;
  var isDef = breaking.length>=2;

  var catBtns = ''
    + '<button class="btn bsm '+(cat==='open'?'bo-btn':'br-btn')+'" onclick="nav(\'break-open\')">Abierto</button> '
    + '<button class="btn bsm '+(cat==='esl'?'bo-btn':'br-btn')+'" onclick="nav(\'break-esl\')">ESL</button> '
    + '<button class="btn bsm '+(cat==='nov'?'bo-btn':'br-btn')+'" onclick="nav(\'break-nov\')">Novatos</button> '
    + '<button class="btn bsm br-btn" onclick="nav(\'break-adjs\')">Jueces</button>';

  var warning = isDef ? '' : '<div class="alert al-info" style="margin-bottom:12px">Clasificación provisional. El break definitivo se confirma al concluir las rondas preliminares.</div>';

  var items = '';
  if(list.length === 0){
    items = '<div style="text-align:center;padding:32px;color:#9a3412">Sin equipos en esta categoría aún.</div>';
  } else {
    list.forEach(function(t, i){
      items += '<div class="brk-item">'
        + '<span class="brk-pos">'+(i+1)+'</span>'
        + '<div style="flex:1">'
        + '<div style="font-weight:700;font-size:14px">'+t.name+' <span class="badge bbrk">BREAK</span></div>'
        + '<div style="font-size:11px;color:#9a3412">'+t.inst+' · '+t.wins+'V · '+t.pts+'pts · ORA: '+t.spk+'</div>'
        + '</div>'
        + '<span style="font-size:11px;color:#9a3412">'+t.s1+' · '+t.s2+'</span>'
        + '</div>';
    });
  }

  return '<div class="page">'
    + '<div class="ph"><span class="ph-e">🏆</span><div><div class="ph-t">Break — '+label+'</div><div class="ph-s">'+list.length+' equipo'+(list.length!==1?'s':'')+'</div></div></div>'
    + '<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">'+catBtns+'</div>'
    + '<div class="card">'
    + '<div class="ct">'+(isDef?'Equipos clasificados — Eliminatorias':'Clasificación provisional')+'</div>'
    + warning
    + items
    + '</div></div>';
}

  if(chkA(u,p)){D.role='admin';D.token='admin';D.alert=null;nav('admin');return}

const FB_ADJ=['Imparcialidad','Claridad del feedback','Profundidad del análisis','Puntualidad'];
const FB_TEAM=['Argumentación','Refutación','Elocuencia','Estructura'];
function renderPrivate(){
  const part=getPartByToken(D.token);
  if(!part)return`<div class="page-sm" style="padding-top:40px"><div class="card" style="text-align:center;padding:40px"><div style="font-size:40px">🔐</div><div style="color:var(--red);font-weight:700;margin-top:10px">Token inválido</div><button class="btn bo-btn bsm" style="margin-top:14px" onclick="nav('login')">← Login</button></div></div>`;
  const isAdj=part.type==='juez';
  const myD=[];
  D.rounds.forEach(r=>r.debates.forEach(d=>{
    if(isAdj&&d.panel&&(d.panel.chair===part.data.id||d.panel.panelists.includes(part.data.id)||d.panel.trainees.includes(part.data.id)))myD.push({round:r,debate:d});
    if(!isAdj&&(d.prop===part.data.id||d.opp===part.data.id))myD.push({round:r,debate:d});
  }));
  const openD=myD.filter(({round:r})=>r.fbOpen);
  return`<div class="page-md" style="padding-top:18px">
  <div class="ph-header">
    <span class="ph-role">${isAdj?'⚖ Juez':'🗣 Debatiente'}</span>

    <div style="font-size:12px;color:var(--wh4);margin-top:3px">${part.data.inst}</div>
    ${isAdj?`<div style="margin-top:5px">${starsH(part.data.score)}</div>`:`<div style="font-size:11px;color:var(--wh7);margin-top:3px">${part.data.s1} · ${part.data.s2} · ${part.data.s3}</div>`}
  </div>
  <div class="card">
    <div class="ct">📋 Mis Debates</div>
    ${myD.length?myD.map(({round:r,debate:d})=>{
      const myRole=isAdj?(d.panel.chair===part.data.id?'Chair':d.panel.panelists.includes(part.data.id)?'Panelista':'Trainee'):d.prop===part.data.id?'Proposición':'Oposición';
      return`<div class="di-card">
        <div style="margin-bottom:5px"><span class="rp ${r.status==='done'?'rp-done':r.status==='active'?'rp-act':'rp-pub'}">${r.name}</span> <span class="badge ${isAdj?(myRole==='Chair'?'b-chair':myRole==='Panelista'?'b-panel':'b-train'):(myRole==='Proposición'?'b-prop':'b-opp')}">${myRole}</span></div>
        <div class="di-teams"><span class="di-team di-prop">${tn(d.prop)}</span><span class="di-vs">VS</span><span class="di-team di-opp">${tn(d.opp)}</span></div>
        <div class="di-meta"><span>📍 ${d.room}</span>${d.winner?`<span class="di-winner">🏆 ${tn(d.winner)}</span>`:`<span class="di-pend">⏳ Pendiente</span>`}</div>
      </div>`;
    }).join(''):`<div style="text-align:center;padding:22px;color:#9a3412">Sin debates asignados aún.</div>`}
  </div>
  <div class="card">
    <div class="ct">💬 Feedback</div>
    ${openD.length?openD.map(({round:r,debate:d})=>{
      const targets=isAdj
        ?[{id:d.prop,type:'equipo',lbl:'Proposición: '+tn(d.prop)},{id:d.opp,type:'equipo',lbl:'Oposición: '+tn(d.opp)}]
        :[{id:d.panel.chair,type:'juez',lbl:'Chair: '+an(d.panel.chair)},...(d.panel.panelists||[]).map(id=>({id,type:'juez',lbl:'Panelista: '+an(id)}))];
      return targets.filter(t=>t.id).map(tgt=>{
        if(hasFB(d.id,D.token,tgt.id)){
          const fb=(D.feedbacks[d.id]||[]).find(f=>f.from===D.token&&f.targetId===tgt.id);
          return`<div class="di-card"><div style="font-weight:700;font-size:12px;margin-bottom:5px">${r.name} · ${tgt.lbl}</div><div class="alert al-ok">✓ Enviado · Score: <strong>${fb.score}/5</strong></div></div>`;
        }
        const criList=tgt.type==='juez'?FB_ADJ:FB_TEAM;
        return`<div class="di-card" style="margin-bottom:10px">
          <div style="font-weight:700;font-size:12px;color:var(--od);margin-bottom:8px">${r.name} · ${tgt.lbl}</div>
          ${criList.map(c=>`<div class="fb-cri">
            <div class="fb-cri-lbl">${c}</div>
            <div id="fbs_${d.id}_${tgt.id}_${c.replace(/\s/g,'_')}">
              ${[1,2,3,4,5].map(n=>`<span class="fb-star" onclick="setFBStar('${d.id}','${tgt.id}','${c.replace(/\s/g,'_')}',${n})">☆</span>`).join('')}
            </div>
          </div>`).join('')}
          <label class="fl" style="margin-top:8px">Comentario (opcional)</label>
          <textarea id="fbc_${d.id}_${tgt.id}" placeholder="Sé específico y constructivo..."></textarea>
          <button class="btn bo-btn bsm" onclick="submitFB('${d.id}','${D.token}','${tgt.id}','${tgt.type}','${criList.join('|')}')">Enviar feedback 💬</button>
        </div>`;
      }).join('');
    }).join(''):`<div class="alert al-info">🔒 Los formularios de feedback están cerrados. Se abrirán al finalizar cada ronda.</div>`}
  </div>
  <div style="text-align:center"><button class="btn br-btn bsm" onclick="nav('home')">← Inicio</button></div></div>`;
}
function setFBStar(dId,tId,cKey,val){
  const el=document.getElementById(`fbs_${dId}_${tId}_${cKey}`);
  if(!el)return;
  el.querySelectorAll('.fb-star').forEach((s,i)=>{s.textContent=i<val?'★':'☆';s.classList.toggle('on',i<val)});
  el.dataset.val=val;
}
function submitFB(dId,fromTok,tId,tType,criStr){
  const criList=criStr.split('|');
  const criteria={};let total=0;
  criList.forEach(c=>{
    const el=document.getElementById(`fbs_${dId}_${tId}_${c.replace(/\s/g,'_')}`);
    const val=el?parseInt(el.dataset.val||0):1;
    criteria[c]=Math.max(1,Math.min(5,isNaN(val)?1:val));
    total+=criteria[c];
  });
  const score=Math.round(total/criList.length*10)/10;
  const comment=(document.getElementById(`fbc_${dId}_${tId}`)?.value||'').trim();
  if(!D.feedbacks[dId])D.feedbacks[dId]=[];
  D.feedbacks[dId].push({id:gid(),from:fromTok,targetId:tId,targetType:tType,score,criteria,comment,ts:tnow()});
  toast('💬 Feedback enviado — ¡Gracias!');render();
}

function setChair(rId,dId,adjId){
  const round=getRound(rId);const deb=round.debates.find(d=>d.id===dId);if(!deb)return;
  deb.panel.chair=adjId||null;
  deb.panel.panelists=(deb.panel.panelists||[]).filter(id=>id!==adjId);
  deb.panel.trainees=(deb.panel.trainees||[]).filter(id=>id!==adjId);
  render();
}
function cycleJudge(rId,dId,adjId){
  const round=getRound(rId);const deb=round.debates.find(d=>d.id===dId);if(!deb)return;
  const pan=deb.panel.panelists||[];const trn=deb.panel.trainees||[];
  if(pan.includes(adjId)){
    deb.panel.panelists=pan.filter(x=>x!==adjId);
    deb.panel.trainees=[...trn,adjId];
  } else if(trn.includes(adjId)){
    deb.panel.trainees=trn.filter(x=>x!==adjId);
  } else {
    deb.panel.panelists=[...pan,adjId];
  }
  render();
}
function swapSides(rId,dId){
  const round=getRound(rId);const deb=round.debates.find(d=>d.id===dId);if(!deb)return;
  [deb.prop,deb.opp]=[deb.opp,deb.prop];
  [deb.propScores,deb.oppScores]=[deb.oppScores,deb.propScores];
  if(deb.winner===deb.prop)deb.winner=deb.opp;
  else if(deb.winner===deb.opp)deb.winner=deb.prop;
  toast('⇄ Lados intercambiados');render();
}

function genDraw(rId){
  const round=getRound(rId);if(!round){toast('Ronda no encontrada');return}
  if(D.teams.length<2){toast('Se necesitan al menos 2 equipos');return}
  const shuffled=[...D.teams].sort(()=>Math.random()-0.5);
  const avAdjs=D.adjudicators.filter(a=>a.avail);
  const debates=[];
  for(let i=0;i<shuffled.length-1;i+=2){
    const chair=avAdjs[Math.floor(i/2)%Math.max(avAdjs.length,1)];
    debates.push({
      id:gid(),prop:shuffled[i].id,opp:shuffled[i+1].id,
      panel:{chair:chair?chair.id:null,panelists:[],trainees:[]},
      room:'Sala '+(Math.ceil((i+2)/2)),winner:null,propScores:{},oppScores:{},split:false,
    });
  }
  round.debates=debates;round.status='draw_generado';
  toast('⚡ Draw generado — puedes editar cada debate');render();
}

function saveResult(rId,dId){
  const wEl=document.getElementById('win_'+dId);
  if(!wEl||!wEl.value){toast('Selecciona un ganador');return}
  const round=getRound(rId);const deb=round.debates.find(d=>d.id===dId);if(!deb)return;
  const n=key=>parseInt(document.getElementById(key+dId)?.value)||0;
  deb.winner=wEl.value;
  deb.split=document.getElementById('spl_'+dId)?.checked||false;
  deb.propScores={s1:n('ps1_'),s2:n('ps2_'),s3:n('ps3_'),reply:n('pr_')};
  deb.oppScores= {s1:n('os1_'),s2:n('os2_'),s3:n('os3_'),reply:n('or_')};
  const pt=getTeam(deb.prop),op=getTeam(deb.opp);
  if(pt&&op){
    const ps=deb.propScores,os=deb.oppScores;
    pt.pts+=ps.s1+ps.s2+ps.s3+ps.reply;pt.spk+=ps.s1+ps.s2+ps.s3;pt.reply+=ps.reply;
    op.pts+=os.s1+os.s2+os.s3+os.reply;op.spk+=os.s1+os.s2+os.s3;op.reply+=os.reply;
    if(deb.winner===deb.prop)pt.wins+=1; else op.wins+=1;
  }
  round.status='done';
  toast('✓ Resultado guardado');render();
}

function genElimDraw(rId){
  const round=getRound(rId);if(!round)return;
  const breakTeams=getBreakTeams();
  if(breakTeams.length<2){toast('Se necesitan al menos 2 equipos con break');return}
  const avAdjs=D.adjudicators.filter(a=>a.avail&&a.breaking);
  const debates=[];
  const shuffled=[...breakTeams].sort(()=>Math.random()-.5);
  for(let i=0;i<shuffled.length-1;i+=2){
    const chair=avAdjs[Math.floor(i/2)%Math.max(avAdjs.length,1)];
    debates.push({id:gid(),prop:shuffled[i].id,opp:shuffled[i+1].id,
      panel:{chair:chair?chair.id:null,panelists:[],trainees:[]},
      room:'Sala EL-'+(i/2+1),winner:null,propScores:{},oppScores:{},split:false});
  }
  round.debates=debates;round.status='draw_generado';
  toast('⚡ Draw eliminatorio generado');render();
}
function saveElimResult(rId,dId){
  const wEl=document.getElementById('ew_'+dId);
  if(!wEl||!wEl.value){toast('Selecciona ganador');return}
  const round=getRound(rId);const deb=round.debates.find(d=>d.id===dId);if(!deb)return;
  const pSel=document.getElementById('ep_'+dId)?.value;
  const oSel=document.getElementById('eo_'+dId)?.value;
  const jSel=document.getElementById('ej_'+dId)?.value;
  const rSel=document.getElementById('er_'+dId)?.value;
  if(pSel)deb.prop=pSel;if(oSel)deb.opp=oSel;
  if(jSel)deb.panel.chair=jSel;if(rSel)deb.room=rSel;
  deb.winner=wEl.value;
  round.status='done';
  toast('✓ Resultado eliminatorio guardado');render();
}

// ═══════════════════════════════════════════════════════════
function render(){
  renderNav();
  const isHome=D.view==='home';
  renderHero(isHome);
  const body=document.getElementById('app-body');
  const views={
    home:renderHome,
    'team-tab':renderTeamTab,
    'speaker-tab':renderSpeakerTab,
    'replies-tab':renderRepliesTab,
    motions:renderMotions,
    checkin:renderCheckin,
    'round-results':renderRoundResults,
    'break-open':()=>renderBreakView('open'),
    'break-esl':()=>renderBreakView('esl'),
    'break-nov':()=>renderBreakView('nov'),
    'break-adjs':renderBreakAdjs,
    bracket:renderBracket,
    participants:renderParticipants,
    institutions:renderInstitutions,
    login:renderLogin,
    private:renderPrivate,
    admin:()=>D.role==='admin'?renderAdmin():renderLogin(),
  };
  try{
    body.innerHTML = (views[D.view]||renderHome)();
  }catch(e){
    console.error('View render error:', e);
    body.innerHTML = '<div class="page"><div class="card" style="padding:30px;text-align:center;color:var(--red)"><strong>Error al cargar vista.</strong><br><span style="font-size:12px">'+e.message+'</span></div></div>';
  }
}

render();
</script>
</body>
</html>
